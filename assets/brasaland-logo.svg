<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Logo Brasaland</title>
  <desc id="desc">Logo minimalista y sofisticado de Brasaland: un corte de carne sobre brasas con tipografia elegante.</desc>

  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8F2D1B" />
      <stop offset="1" stop-color="#E85E2B" />
    </linearGradient>
    <linearGradient id="coal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1C1614" />
      <stop offset="1" stop-color="#2A2220" />
    </linearGradient>
  </defs>

  <g transform="translate(28,26)">
    <rect x="0" y="0" width="228" height="228" rx="38" fill="#F6EFE7" />

    <g transform="translate(26,30)">
      <path
        d="M34 80 C42 42, 90 22, 126 36 C162 50, 176 80, 164 104 C152 128, 112 140, 84 132 C56 124, 28 112, 34 80 Z"
        fill="none"
        stroke="url(#ember)"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      <circle cx="79" cy="84" r="5.5" fill="#C3471F" />
      <circle cx="106" cy="70" r="4.5" fill="#C3471F" />
      <circle cx="126" cy="94" r="5" fill="#C3471F" />

      <path d="M24 146 H176" stroke="url(#coal)" stroke-width="8" stroke-linecap="round" />
      <path d="M24 162 H176" stroke="url(#coal)" stroke-width="8" stroke-linecap="round" opacity="0.85" />

      <path d="M62 145 C72 120, 84 120, 94 145 Z" fill="url(#ember)" />
      <path d="M94 145 C106 110, 122 110, 134 145 Z" fill="url(#ember)" />
      <path d="M40 145 C48 126, 58 126, 66 145 Z" fill="url(#ember)" opacity="0.9" />
    </g>
  </g>

  <g transform="translate(290,94)">
    <text
      x="0"
      y="56"
      fill="#1A1615"
      font-family="'Manrope', 'Avenir Next', 'Segoe UI', sans-serif"
      font-size="82"
      font-weight="800"
      letter-spacing="2"
    >
      BRASALAND
    </text>

    <rect x="2" y="74" width="350" height="6" rx="3" fill="url(#ember)" />
    <text
      x="2"
      y="112"
      fill="#6A5953"
      font-family="'Manrope', 'Avenir Next', 'Segoe UI', sans-serif"
      font-size="22"
      font-weight="600"
      letter-spacing="3"
    >
      WOOD FIRE GRILL
    </text>
  </g>
</svg>
